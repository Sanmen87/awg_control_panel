x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    logging: *default-logging
    volumes:
      - redis_data:/data

  migrate:
    build:
      context: ./backend
    logging: *default-logging
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ${BACKUP_STORAGE_PATH:-./backups}:/app/backups
    command: python -m app.bootstrap_db

  backend:
    build:
      context: ./backend
    logging: *default-logging
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - ${BACKUP_STORAGE_PATH:-./backups}:/app/backups
      - ./infra/nginx/generated:/shared/nginx
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/letsencrypt:/etc/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    logging: *default-logging
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - ${BACKUP_STORAGE_PATH:-./backups}:/app/backups
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info

  scheduler:
    build:
      context: ./backend
    logging: *default-logging
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - ${BACKUP_STORAGE_PATH:-./backups}:/app/backups
    command: celery -A app.workers.celery_app:celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      target: dev
    logging: *default-logging
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: npm run dev

  nginx:
    image: nginx:1.27-alpine
    logging: *default-logging
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/generated/default.conf:/etc/nginx/conf.d/default.conf
      - ./infra/certbot/www:/var/www/certbot:ro
      - ./infra/certbot/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  frontend_next:
